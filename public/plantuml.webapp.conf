<VirtualHost *:8888>
    ServerAdmin juanvladimir13@gmail.com
    ServerName bthsanjulian.website
    
    DocumentRoot /var/www/plantuml.webapp/public
    ErrorLog ${APACHE_LOG_DIR}/plantuml_webapp_error.log
    CustomLog ${APACHE_LOG_DIR}/plantuml_webapp_access.log combined

    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/bthsanjulian.website/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/bthsanjulian.website/privkey.pem

    php_value session.name "plantuml.webapp"
    php_value session.save_path "/var/lib/php/sessions/plantumlwebapp"

    <Directory /var/www/plantuml.webapp/public>
        Options Indexes FollowSymLinks MultiViews
        AllowOverride All
        Order allow,deny
        allow from all
    </Directory>
</VirtualHost>
